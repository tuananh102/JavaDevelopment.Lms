name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
    paths:
      # Chỉ chạy khi có thay đổi ở frontend hoặc chính workflow này
      - 'frontend/**'
      - '.github/workflows/main.yml'
  workflow_dispatch:   # cho phép chạy tay từ tab Actions (kể cả khi không đổi code)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          # API Key lấy từ GitHub Secrets — KHÔNG hardcode trực tiếp vào file.
          # Đổi VITE_API_KEY cho khớp tên biến bạn dùng trong code.
          VITE_API_KEY: ${{ secrets.GG_STUDIO_API_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4