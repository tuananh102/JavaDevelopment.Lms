name: Build and deploy Spring Boot to Azure

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'backend/**'
  workflow_dispatch: # Cho phép chạy thủ công

env:
  AZURE_WEBAPP_NAME: 'ten-app-service-cua-ban' # CẬP NHẬT: Thay tên App Service của bạn vào đây
  JAVA_VERSION: '17' # Hoặc '21' tùy thuộc vào bạn cấu hình trên Azure

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
        
    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'microsoft'
        cache: 'maven'

    - name: Build with Maven
      run: mvn -B clean package -DskipTests

    - name: Upload artifact for deployment
      uses: actions/upload-artifact@v4
      with:
        name: java-app
        path: '${{ github.workspace }}/backend/target/*.jar'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: java-app

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: '*.jar'