# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy JAR app to Azure Web App - hcmute-lms

on:
  push:
    branches:
      - main
    paths:
      # Chỉ chạy khi có thay đổi ở backend hoặc chính workflow này
      - 'backend/**'
      - '.github/workflows/main_hcmute-lms.yml'
  workflow_dispatch:   # cho phép chạy tay từ tab Actions (kể cả khi không đổi code)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'microsoft'

      - name: Build with Maven
        run: mvn clean install

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: '${{ github.workspace }}/backend/target/*.jar'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout
  
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CCB896082DE440299E9C397B525A0457 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8657E265B5C5412EA3124F18D27AA4F6 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1D04CC3F43C341EA8C3F45E22F54063B }}

      # Tự động đẩy MỌI secret/variable có tiền tố "APP_" lên App Service settings.
      # Quy ước: đặt tên trên GitHub là APP_<TÊN_BIẾN> (vd APP_JWT_SECRET) ->
      # Azure nhận biến <TÊN_BIẾN> (JWT_SECRET) sau khi cắt tiền tố.
      # Thêm biến mới sau này chỉ cần tạo secret/variable trên GitHub, KHÔNG sửa file này.
      - name: Apply App Service settings from GitHub (prefix APP_)
        env:
          SECRETS_JSON: ${{ toJSON(secrets) }}   # tất cả secrets (nhạy cảm: password, JWT...)
          VARS_JSON: ${{ toJSON(vars) }}         # tất cả variables (không nhạy cảm: URL, username...)
        run: |
          RG=$(az webapp list --query "[?name=='hcmute-lms'].resourceGroup | [0]" -o tsv)
          # Gộp vars + secrets, chỉ lấy key có tiền tố APP_, cắt tiền tố, xuất dạng Azure cần
          jq -n --argjson s "$SECRETS_JSON" --argjson v "$VARS_JSON" '
            ($v + $s) | to_entries
            | map(select(.key | startswith("APP_")))
            | map({name: (.key | ltrimstr("APP_")), value: .value, slotSetting: false})
          ' > appsettings.json
          echo "Đẩy $(jq length appsettings.json) biến lên hcmute-lms (RG=$RG)"
          az webapp config appsettings set --name hcmute-lms --resource-group "$RG" --settings @appsettings.json

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'hcmute-lms'
          slot-name: 'Production'
          package: '*.jar'
          