services:
  db:
    image: postgres:18-alpine
    container_name: lms-postgres
    environment:
      POSTGRES_USER: lms_user
      POSTGRES_PASSWORD: lms_password
      POSTGRES_DB: lms_db
    ports:
      - "5432:5432"
    volumes:
      # postgres:18 lưu data trong thư mục con theo version, nên mount ở thư mục cha
      # (postgres <=17 dùng /var/lib/postgresql/data)
      - pgdata:/var/lib/postgresql
    restart: unless-stopped

volumes:
  pgdata:
