spring:
  datasource:
    # Local dev dùng default sau dấu ':'. Trên Azure đặt biến môi trường cùng tên để override.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lms_db}
    username: ${SPRING_DATASOURCE_USERNAME:lms_user}
    password: ${SPRING_DATASOURCE_PASSWORD:lms_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate # Flyway handles schema creation
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

jwt:
  # Production: đặt JWT_SECRET trên Azure (>= 32 bytes). Default chỉ dùng cho local dev.
  secret: ${JWT_SECRET:local-dev-only-secret-change-me-min-32-bytes}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000} # 1 hour
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000} # 7 days
