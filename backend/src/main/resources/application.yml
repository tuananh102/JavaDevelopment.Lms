spring:
  datasource:
    # Local dev dùng default sau dấu ':'. Trên Azure đặt biến môi trường cùng tên để override.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lms_db}
    username: ${SPRING_DATASOURCE_USERNAME:lms_user}
    password: ${SPRING_DATASOURCE_PASSWORD:lms_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate # Flyway handles schema creation
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    # KHÔNG bật baseline-on-migrate cho DB do Flyway quản lý từ đầu:
    # nó sẽ baseline ở version 1 và bỏ qua V1 (file CREATE TABLE) khi schema
    # bị coi là "không rỗng", dẫn tới thiếu bảng.
    baseline-version: 0

app:
  cors:
    # Danh sách origin được phép gọi API, phân tách bằng dấu phẩy. Default cho local dev
    # (Vite/Express). KHÔNG dùng "*" — vừa mở toàn bộ API vừa không tương thích khi bật
    # allowCredentials.
    #
    # Production: biến môi trường Azure tên CORS_ALLOWED_ORIGINS. Theo quy ước workflow
    # (main_hcmute-lms.yml), tạo biến GitHub tên APP_CORS_ALLOWED_ORIGINS -> workflow cắt
    # tiền tố "APP_" -> Azure nhận CORS_ALLOWED_ORIGINS (giống JWT_SECRET). Giá trị là
    # origin GitHub Pages, KHÔNG có path/dấu "/" cuối, vd: https://tuananh102.github.io
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

jwt:
  # Secret được dùng làm khóa HS256 ở dạng chuỗi UTF-8 THÔ (không còn Base64-decode).
  # PHẢI >= 32 ký tự (=> >= 256-bit); ngắn hơn sẽ lỗi ký JWT khi login.
  # Production: đặt JWT_SECRET trên Azure >= 32 ký tự. Default chỉ dùng cho local dev.
  secret: ${JWT_SECRET:local-dev-only-secret-change-me-min-32-bytes}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000} # 1 hour
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000} # 7 days
